name: Minecraft 26.2 MoltenVK dependencies

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/moltenvk-26_2.yml'
      - 'scripts/build-lwjgl-ios-3.4.1.sh'
      - 'scripts/lwjgl-ios-3.4.1.patch'
      - 'JavaApp/libs/lwjgl/**'
      - 'JavaApp/src/launcher/net/kdt/pojavlaunch/PojavLauncher.java'
      - 'JavaApp/src/lwjgl/**'
      - 'Natives/LauncherProfileEditorViewController.m'
      - 'Natives/MinecraftOptionUtils.*'
      - 'Natives/JavaLauncher.m'

permissions:
  contents: read

env:
  MOLTENVK_VERSION: v1.4.1

jobs:
  build-dependencies:
    name: Build arm64 iOS Vulkan dependencies
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout Amethyst
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Install build tools
        run: brew install ant automake autoconf libtool cmake ninja make

      - name: Build LWJGL 3.4.1 for iOS
        run: bash scripts/build-lwjgl-ios-3.4.1.sh "$GITHUB_WORKSPACE" "$RUNNER_TEMP/overlay"

      - name: Build MoltenVK for iOS
        run: |
          git clone --depth 1 --branch "$MOLTENVK_VERSION" https://github.com/KhronosGroup/MoltenVK.git "$RUNNER_TEMP/MoltenVK"
          cd "$RUNNER_TEMP/MoltenVK"
          ./fetchDependencies --ios
          make ios
          MOLTENVK_BINARY=$(find Package/Release/MoltenVK/dynamic/MoltenVK.xcframework -path '*ios-arm64*' -type f -name MoltenVK -print -quit)
          test -n "$MOLTENVK_BINARY"
          cp "$MOLTENVK_BINARY" "$RUNNER_TEMP/overlay/Natives/resources/Frameworks/libMoltenVK.dylib"
          xcrun vtool -show-build "$RUNNER_TEMP/overlay/Natives/resources/Frameworks/libMoltenVK.dylib" | grep -q 'platform IOS'

      - name: Apply dependency overlay
        run: rsync -a "$RUNNER_TEMP/overlay/" "$GITHUB_WORKSPACE/"

      - name: Compile launcher Java and verify 26.2 classes
        run: |
          gmake -C JavaApp clean all BOOTJDK="$JAVA_HOME/bin" \
            EXTRA_JCFLAGS="--add-exports=java.desktop/com.apple.eawt=ALL-UNNAMED --add-exports=java.desktop/sun.font=ALL-UNNAMED"
          jar tf JavaApp/build/lwjgl.jar | grep -q 'org/lwjgl/util/spvc/Spvc.class'
          jar tf JavaApp/build/lwjgl.jar | grep -q 'org/lwjgl/vulkan/VkVertexInputBindingDivisorDescription.class'
          javap -classpath JavaApp/build/lwjgl.jar org.lwjgl.glfw.GLFW | grep -q 'glfwSetPreeditCallback'

      - name: Upload dependency overlay
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-minecraft-26.2-ios-dependencies
          path: ${{ runner.temp }}/overlay
          if-no-files-found: error

  build-amethyst:
    name: Build test IPA with MoltenVK
    if: github.event_name == 'workflow_dispatch'
    needs: build-dependencies
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout Amethyst
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Zulu Java 8
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '8'

      - name: Install packaging tools
        run: brew install cmake ldid make wget

      - name: Download iOS Vulkan dependencies
        uses: actions/download-artifact@v4
        with:
          name: amethyst-minecraft-26.2-ios-dependencies
          path: .

      - name: Build test IPA
        run: |
          export PATH=/opt/homebrew/bin:$PATH
          export SLIMMED=1
          gmake -j$(sysctl -n hw.ncpu) dsym package PLATFORM=2 BOOTJDK="$JAVA_HOME/bin"

      - name: Upload test IPA
        uses: actions/upload-artifact@v4
        with:
          name: amethyst-minecraft-26.2-moltenvk-test
          path: |
            artifacts/org.angelauramc.amethyst-*-ios.ipa
            artifacts/org.angelauramc.amethyst.slimmed-*-ios.ipa
            artifacts/AngelAuraAmethyst.dSYM
          if-no-files-found: error
